<!DOCTYPE html>
<html lang="pt-br"
		xmlns:th="http://www.thymeleaf.org"
		xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
		layout:decorate="~{_layouts/base}"
		th:with="htmlTitle='Bíblias'">
	<head>
		<title th:text="${htmlTitle}"></title>
	</head>
	<body>
		<div layout:fragment="conteudo">
			<nav>
				<ol class="breadcrumb">
					<li th:replace="~{_fragments/breadcrumb :: bau()}"></li>
					<li th:replace="~{biblia/_fragments :: breadcrumb_index(active=true)}"></li>
				</ol>
			</nav>
			<h1>
				<span>
					<img src="/img/biblia-32.png">
					<span th:text="${htmlTitle}"></span>
				</span>
				<div id="toolbar" class="btn-toolbar float-end d-print-none">
				</div>
			</h1>
			<th:block th:if="${#lists.isEmpty(data.biblias)}">
				<p>Não há Bíblias cadastradas.</p>
			</th:block>
			<th:block th:if="${!#lists.isEmpty(data.biblias)}">
				<div id="crudLista" class="mb-3">
					<table class="table table-sm table-hover">
						<thead>
							<tr id="selectTitle">
								<th>Nome</th>
								<th>Livros</th>
								<th class="botoes d-print-none">
								</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="biblia : ${data.biblias}">
								<td>
									<span th:class="${'fi fi-' + biblia.bandeira}" th:title="${biblia.idioma}"></span>
									<a th:href="@{'/biblia/' + ${biblia.id}}" th:text="${biblia.nome}"></a>
								</td>
								<td th:text="${biblia.livros}" class="text-end"></td>
								<td class="botoes d-print-none">
									<div class="btn-group" role="group">
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</th:block>
		</div>
	</body>
</html>
