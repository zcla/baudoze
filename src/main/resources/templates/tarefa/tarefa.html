<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
	<head>
		<title>Baú do Zé : Tarefas</title>
		<th:block th:insert="~{_fragments/geral.html :: head}"></th:block>
	</head>
	<body>
		<nav th:replace="~{_fragments/geral.html :: nav}"></nav>
		<div class="container-fluid">
			<div th:replace="~{_fragments/geral.html :: mensagens}"></div>
			<div id="conteudo">
				<nav>
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><img src="/img/bau-16.png"><a href="/">Baú</a></li>
						<li class="breadcrumb-item"><img src="/img/tarefa-16.png"><a href="/tarefa">Tarefas</a></li>
						<li class="breadcrumb-item active"><img th:src="${'/img/button-' + (tarefa.id == null ? 'incluir' : 'alterar') + '.png'}"><span th:text="${tarefa.id == null} ? 'Nova' : 'Editar'"></span></li>
					</ol>
				</nav>
				<h1>
					<span style="position: relative">
						<img th:src="${'/img/tarefa-32.png'}">
						<img th:src="${'/img/layer-' + (tarefa.id == null ? 'incluir' : 'alterar') + '-32.png'}" style="position: absolute; bottom: 0px; left: 0px; z-index: 1;">
					</span>
					<span th:text="${tarefa.id == null} ? 'Nova tarefa' : 'Editar tarefa'"></span>
				</h1>
				<div id="form">
					<!--
					<div th:unless="${tarefa}" class="mt-3">
						<div class="alert alert-danger">Tarefa não encontrada!</div>
					</div>
					-->
					<form th:action="@{/tarefa/salvar}" th:object="${tarefa}" method="post">
						<input type="hidden" th:field="*{id}">
						<div class="row mb-3">
							<div>
								<label>Título</label>
								<input type="text"
									th:field="*{titulo}"
									th:classappend="${#fields.hasErrors('titulo')} ? ' is-invalid' : ''"
									class="form-control">
								<div class="invalid-feedback"
									th:if="${#fields.hasErrors('titulo')}"
									th:errors="*{titulo}">
								</div>
							</div>
						</div>
						<div class="row mb-3">
							<div>
								<label>Descrição</label>
								<input type="text" th:field="*{descricao}" class="form-control">
								<div th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></div>
							</div>
						</div>
						<div class="row mb-3">
							<div>
								<label th:for="${tarefaMae}" class="form-label">Tarefa "mãe"</label>
								<select th:field="*{tarefaMae}" id="tarefaMae" name="tarefaMae" class="form-select">
									<option value=""></option>
									<option th:each="tarefaMae : ${tarefasMae}" th:value="${tarefaMae.id}" th:text="${#strings.repeat('&nbsp;', 3 * tarefaMae.indent) + tarefaMae.titulo}" th:disabled="${tarefaMae.disabled}"></option>
								</select>
								<div th:if="${#fields.hasErrors('tarefaMae')}" th:errors="*{tarefaMae}"></div>
							</div>
						</div>
						<div class="btn-group mb-3">
							<button type="submit" class="btn bg-success-subtle" title="Ok"><img src="/img/button-ok.png"> Ok</button>
							<a th:href="@{'/tarefa'}" type="button" class="btn bg-danger-subtle" title="Cancelar"><img src="/img/button-cancelar.png"> Cancelar</a>
						</div>
					</form>
				</div>
			</div>
		</div>
		<footer th:replace="~{_fragments/geral.html :: footer}"></footer>
	</body>
</html>
