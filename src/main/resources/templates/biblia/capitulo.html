<!DOCTYPE html>
<html lang="pt-br"
		xmlns:th="http://www.thymeleaf.org"
		xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
		layout:decorate="~{_layouts/base}"
		th:with="htmlTitle=${data.livro.sigla} + ' ' + ${data.capitulo.numero}">
	<head>
		<title th:text="${htmlTitle}"></title>
	</head>
	<body>
		<div layout:fragment="conteudo">
			<nav>
				<ol class="breadcrumb">
					<li th:replace="~{_fragments/breadcrumb :: bau()}"></li>
					<li class="breadcrumb-item">
						<img src="/img/biblia-16.png">
						<a href="/biblia">Bíblias</a>
					</li>
					<li class="breadcrumb-item">
						<a th:href="@{'/biblia/' + ${data.biblia.id}}" th:text="${data.biblia.nome}"></a>
					</li>
					<li class="breadcrumb-item">
						<a th:href="@{'/biblia/livro/' + ${data.livro.id}}" th:text="${data.livro.nome}"></a>
					</li>
					<li class="breadcrumb-item active">
						<span th:text="${htmlTitle}"></span>
					</li>
				</ol>
			</nav>
			<h1>
				<span>
					<span th:text="${htmlTitle}"></span>
				</span>
				<div id="toolbar" class="btn-toolbar float-end d-print-none">
				</div>
			</h1>
			<th:block th:if="${#lists.isEmpty(data.versiculos)}">
				<p>Não há versículos cadastrados.</p>
			</th:block>
			<th:block th:if="${!#lists.isEmpty(data.versiculos)}">
				<div id="crudLista" class="mb-3">
					<table class="table table-sm table-hover">
						<thead>
							<tr id="selectTitle">
								<th>Versículo</th>
								<th>Texto</th>
								<th class="botoes d-print-none">
								</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="versiculo : ${data.versiculos}">
								<td th:text="${versiculo.numero}"></td>
								<td th:text="${versiculo.texto}"></td>
								<td class="botoes d-print-none">
									<div class="btn-group" role="group">
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</th:block>
		</div>
	</body>
</html>
