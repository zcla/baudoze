          uri: https://github.com/Bible-Projects/believers-sword-next/raw/refs/heads/main/Modules/Bible/B%C3%ADblia%20Ave-Maria%201959.SQLite3
          nome: Bíblia Ave-Maria 1959
          idioma: pt-br
        - codigo: github/believers-sword/BPMS1950
          uri: https://github.com/Bible-Projects/believers-sword-next/raw/refs/heads/main/Modules/Bible/B%C3%ADblia%20Padre%20Matos%20Soares%201950.SQLite3
          nome: Bíblia Padre Matos Soares 1950
          idioma: pt-br
      ph4-importa:
        # ph4 https://www.ph4.org/b4_index.php
        - codigo: ph4.org/BAM
