<!DOCTYPE html>
<html lang="pt-br"
		xmlns:th="http://www.thymeleaf.org"
		xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
		layout:decorate="~{_layouts/base}">
	<head>
		<title>ERRO 😬</title>
	</head>
	<body>
		<div layout:fragment="conteudo" class="container-fluid">
			<h1>ERRO 😬</h1>
			<dl>
				<th:block th:if="${errors}">
					<dt>Status code</dt>
					<dd th:text="${statusCode}"></dd>
				</th:block>
				<dt>Exception</dt>
				<dd th:text="${exception}"></dd>
				<dt>Message</dt>
				<dd th:text="${message}"></dd>
				<th:block th:if="${errors}">
					<dt>Binding errors</dt>
					<dd th:text="${errors}"></dd>
				</th:block>
				<dt>Stack trace</dt>
				<dd>
					<pre><code th:text="${trace}"></code></pre>
				</dd>
			</dl>
		</div>
	</body>
</html>
