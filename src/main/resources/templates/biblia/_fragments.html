<!-- breadcrumb_index() -->
<li th:fragment="breadcrumb_index()" th:with="active=${active} ?: false, text=${text} ?: 'Bíblias'" th:class="'breadcrumb-item' + (active ? ' active' : '')">
	<img src="/img/biblia-16.png">
	<a th:if="${!active}" th:text="${text}" href="/biblia"></a>
	<span th:if="${active}" th:text="${text}"></span>
</li>

<!-- breadcrumb_biblia(id, nome) -->
<li th:fragment="breadcrumb_biblia(id, nome)" th:with="active=${active} ?: false" th:class="'breadcrumb-item' + (active ? ' active' : '')">
	<a th:if="${!active}" th:text="${nome}" th:href="@{'/biblia/' + ${id}}"></a>
	<span th:if="${active}" th:text="${nome}"></span>
</li>

<!-- breadcrumb_livro(id, nome) -->
<li th:fragment="breadcrumb_livro(id, nome)" th:with="active=${active} ?: false" th:class="'breadcrumb-item' + (active ? ' active' : '')">
	<a th:if="${!active}" th:text="${nome}" th:href="@{'/biblia/livro/' + ${id}}"></a>
	<span th:if="${active}" th:text="${nome}"></span>
</li>
