<!-- breadcrumb_index() -->
<li th:fragment="breadcrumb_index()" th:with="active=${active} ?: false, text=${text} ?: 'Bíblias'" th:class="'breadcrumb-item' + (active ? ' active' : '')">
	<img src="/img/biblia-16.png">
	<a th:if="${!active}" th:text="${text}" href="/biblia"></a>
	<span th:if="${active}" th:text="${text}"></span>
</li>
