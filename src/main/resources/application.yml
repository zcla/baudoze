          uri: https://www.ph4.org/_dl.php?back=bbl&a=BEP&b=mybible&c
          nome: Bíblia Sagrada Edição Pastoral 1990
          idioma: pt-br
        - codigo: ph4.org/BJRD
          uri: https://www.ph4.org/_dl.php?back=bbl&a=BJRD&b=mybible&c
          nome: Bíblia de Jerusalém 2002
          idioma: pt-br
        - codigo: ph4.org/BPT'09D
          uri: https://www.ph4.org/_dl.php?back=bbl&a=BPT'09D&b=mybible&c
          nome: A Bíblia para todos Edição Católica
          idioma: pt-pt
        - codigo: ph4.org/CNBB
          uri: https://www.ph4.org/_dl.php?back=bbl&a=CNBB&b=mybible&c
          nome: Bíblia CNBB 2002
          idioma: pt-br
        - codigo: ph4.org/DBFC
          uri: https://www.ph4.org/_dl.php?back=bbl&a=DBFC&b=mybible&c
          nome: Bíblia Difusora Bíblica 1955 (Franciscanos Capuchinhos)
          idioma: pt-pt
        - codigo: ph4.org/DIF
          uri: https://www.ph4.org/_dl.php?back=bbl&a=DIF&b=mybible&c
          nome: Bíblia Difusora Bíblica (Franciscanos Capuchinhos)
          idioma: pt-pt
        - codigo: ph4.org/EUNSA
          uri: https://www.ph4.org/_dl.php?back=bbl&a=EUNSA&b=mybible&c
          nome: Bíblia de Navarra
          idioma: es-es
        - codigo: ph4.org/RSV-CE
          uri: https://www.ph4.org/_dl.php?back=bbl&a=RSV-CE&b=mybible&c
          nome: Revised Standard Version, Second Catholic Edition
          idioma: en-us

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type.descriptor.sql.BasicBinder: TRACE
      springframework:
        web: INFO

spring:
  application:
    name: Bau do Zé
  datasource:
    password: ${DATABASE_PASSWORD}
    url: jdbc:mysql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_DB}
    username: ${DATABASE_USER}
  jpa:
    hibernate:
      ddl-auto: none
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_AUTH_CLIENT_ID}
            client-secret: ${GOOGLE_AUTH_CLIENT_SECRET}
            scope: openid,profile,email
  thymeleaf:
    cache: false
    suffix: .html
    template-loader-path: classpath:/templates
